<html>
    <head>
    </head>
    <body>
        <script>
            count = 0;
            n = parseInt(prompt("enter the n:"));
            for (i = 2; i < n; i++){
                   if(n%i==0){
                     count ++;
                   }         
            }
            if(count == 0){
                document.write("number is prime");
            }
            else{
                document.write("number is not prime");
            }
        </script>
    </body>
</html>
