<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         n =  parseInt(prompt("enter the size of array:"));
        array = [n];
        for(i=0;i<n;i++){
       array[i] = parseInt(prompt("enter the array element:")); 
        }
        for(i=0;i<n-1;i++){
            for(j=0;j<n-i-1;j++){
             if(array[j]>array[j+1]){
                    temp=array[j];
                    array[j]=array[j+1];
                    array[j+1]=temp;
             }
            }
        }
        document.write(array);
    </script>
</body>
</html>
