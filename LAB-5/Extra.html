<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        str = prompt("enter the string:");
        array = str.split(" ");
        word = prompt("enter the word from array:");
        rword = prompt("enter the word that u want to replace:");
        for(i=0;i<array.length;i++){
         if(array[i]==word){
            array[i]=rword;
         }
        }
        document.write(array);
    </script>
</body>
</html>
