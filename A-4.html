    <body>
        <script>
         n= parseInt(prompt("enter the number:"));
         n1=0;
         n2=1;
         count =0;
         document.write(n1);
         document.write(n2);
         while(count < n){
         ans  = n1 + n2;
         n1 = n2;
         n2 = ans ;
         count ++;
         document.write(ans);
         }
         </script>
    </body>
</html>
